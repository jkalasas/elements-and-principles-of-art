<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elements and Principles of Art</title>
  <script>
    // SPA redirect for GitHub Pages with HashRouter
    // Redirects to index.html which handles routing via hash
    var path = window.location.pathname;
    var base = path.substring(0, path.lastIndexOf('/') + 1);
    window.location.replace(base + 'index.html');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
