<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elements and Principles of Art</title>
  <script>
    // SPA redirect for GitHub Pages
    // Preserves the path and redirects to index.html
    var path = window.location.pathname;
    var repo = window.location.pathname.split('/')[1];
    var indexUrl = '/' + repo + '/index.html' + path;
    window.location.replace(indexUrl);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
